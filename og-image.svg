<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d27;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pin-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#6366f1" stroke-width="1" fill="none">
    <line x1="0" y1="0" x2="0" y2="630" /><line x1="60" y1="0" x2="60" y2="630" />
    <line x1="120" y1="0" x2="120" y2="630" /><line x1="180" y1="0" x2="180" y2="630" />
    <line x1="240" y1="0" x2="240" y2="630" /><line x1="300" y1="0" x2="300" y2="630" />
    <line x1="360" y1="0" x2="360" y2="630" /><line x1="420" y1="0" x2="420" y2="630" />
    <line x1="480" y1="0" x2="480" y2="630" /><line x1="540" y1="0" x2="540" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" /><line x1="660" y1="0" x2="660" y2="630" />
    <line x1="720" y1="0" x2="720" y2="630" /><line x1="780" y1="0" x2="780" y2="630" />
    <line x1="840" y1="0" x2="840" y2="630" /><line x1="900" y1="0" x2="900" y2="630" />
    <line x1="960" y1="0" x2="960" y2="630" /><line x1="1020" y1="0" x2="1020" y2="630" />
    <line x1="1080" y1="0" x2="1080" y2="630" /><line x1="1140" y1="0" x2="1140" y2="630" />
    <line x1="0" y1="0" x2="1200" y2="0" /><line x1="0" y1="60" x2="1200" y2="60" />
    <line x1="0" y1="120" x2="1200" y2="120" /><line x1="0" y1="180" x2="1200" y2="180" />
    <line x1="0" y1="240" x2="1200" y2="240" /><line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="360" x2="1200" y2="360" /><line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="0" y1="480" x2="1200" y2="480" /><line x1="0" y1="540" x2="1200" y2="540" />
    <line x1="0" y1="600" x2="1200" y2="600" />
  </g>

  <!-- Decorative glow circles -->
  <circle cx="900" cy="200" r="200" fill="#6366f1" opacity="0.06" />
  <circle cx="300" cy="450" r="150" fill="#818cf8" opacity="0.04" />

  <!-- Accent bar at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent-grad)" />

  <!-- Logo icon: Map pin with magnifying glass -->
  <g transform="translate(120, 180)">
    <!-- Magnifying glass circle -->
    <circle cx="70" cy="70" r="55" stroke="#6366f1" stroke-width="6" fill="none" opacity="0.3" />
    <line x1="110" y1="110" x2="135" y2="135" stroke="#6366f1" stroke-width="6" stroke-linecap="round" opacity="0.3" />

    <!-- Map pin -->
    <g transform="translate(35, 15)">
      <path d="M35 0C15.67 0 0 15.67 0 35c0 26.25 35 55 35 55s35-28.75 35-55C70 15.67 54.33 0 35 0z" fill="url(#pin-grad)" />
      <circle cx="35" cy="33" r="16" fill="#0f1117" />
      <circle cx="35" cy="33" r="8" fill="#818cf8" />
    </g>

    <!-- Small scattered pins for "search" effect -->
    <g opacity="0.4">
      <circle cx="170" cy="30" r="8" fill="#6366f1" />
      <circle cx="170" cy="30" r="3" fill="#0f1117" />
      <circle cx="200" cy="80" r="6" fill="#818cf8" />
      <circle cx="200" cy="80" r="2.5" fill="#0f1117" />
      <circle cx="160" cy="100" r="7" fill="#6366f1" />
      <circle cx="160" cy="100" r="2.5" fill="#0f1117" />
    </g>
  </g>

  <!-- Title -->
  <text x="120" y="400" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="800" fill="#e8eaf0" letter-spacing="-1">
    Local Business Finder
  </text>

  <!-- Tagline -->
  <text x="120" y="455" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="400" fill="#8b8fa3">
    Discover local businesses without websites — build sites that sell.
  </text>

  <!-- Pipeline badges -->
  <g transform="translate(120, 490)">
    <rect x="0" y="0" width="70" height="32" rx="16" fill="rgba(99, 102, 241, 0.15)" />
    <text x="35" y="21" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#818cf8" text-anchor="middle">Find</text>

    <rect x="82" y="0" width="85" height="32" rx="16" fill="rgba(99, 102, 241, 0.15)" />
    <text x="124.5" y="21" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#818cf8" text-anchor="middle">Gather</text>

    <rect x="179" y="0" width="82" height="32" rx="16" fill="rgba(99, 102, 241, 0.15)" />
    <text x="220" y="21" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#818cf8" text-anchor="middle">Curate</text>

    <rect x="273" y="0" width="100" height="32" rx="16" fill="rgba(99, 102, 241, 0.15)" />
    <text x="323" y="21" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#818cf8" text-anchor="middle">Generate</text>

    <rect x="385" y="0" width="62" height="32" rx="16" fill="rgba(34, 197, 94, 0.15)" />
    <text x="416" y="21" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#22c55e" text-anchor="middle">Sell</text>

    <rect x="459" y="0" width="90" height="32" rx="16" fill="rgba(34, 197, 94, 0.15)" />
    <text x="504" y="21" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#22c55e" text-anchor="middle">Manage</text>

    <rect x="561" y="0" width="90" height="32" rx="16" fill="rgba(34, 197, 94, 0.15)" />
    <text x="606" y="21" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#22c55e" text-anchor="middle">Analyze</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent-grad)" />
</svg>
