<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elige tu plan — AhoraTengoPagina</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display&family=Inter:wght@800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --accent-light: #ede9fe;
      --green: #16a34a;
      --green-dark: #15803d;
      --green-light: #dcfce7;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f9fafb;
      --white: #ffffff;
      --red: #ef4444;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }

    html { font-size: 16px; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 20px; font-weight: 800; color: #1A56DB; letter-spacing: -0.5px; text-decoration: none; }
    .secure-badge { display: flex; align-items: center; gap: 6px; font-size: .78rem; color: var(--muted); }
    .secure-badge svg { color: var(--green); }

    .planes-wrapper { max-width: 760px; margin: 40px auto; padding: 0 20px 80px; animation: slideUp 0.4s ease; }
    .planes-heading { font-family: 'DM Serif Display', serif; font-size: 1.6rem; text-align: center; margin-bottom: 8px; }
    .planes-sub { font-size: .9rem; color: var(--muted); text-align: center; line-height: 1.6; margin-bottom: 32px; }
    .planes-sub strong { color: var(--text); font-weight: 600; }

    .pricing-grid { display: grid; grid-template-columns: repeat(var(--pricing-cols, 1), 1fr); gap: 20px; margin-bottom: 24px; }

    .pricing-card { background: var(--white); border: 2px solid var(--border); border-radius: var(--radius); padding: 32px; text-align: left; position: relative; transition: border-color 0.2s, transform 0.2s; box-shadow: var(--shadow); }
    .pricing-card.featured { border-color: var(--green); transform: scale(1.03); box-shadow: 0 8px 30px rgba(34, 197, 94, 0.12); }
    .pricing-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: var(--green); color: #fff; font-size: 12px; font-weight: 700; padding: 4px 16px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
    .pricing-price { font-size: 42px; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .pricing-price span { font-size: 16px; font-weight: 500; color: var(--muted); }
    .pricing-note { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .pricing-name { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
    .pricing-desc { font-size: 13px; color: var(--muted); font-style: italic; line-height: 1.5; margin-bottom: 16px; }
    .pricing-features { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .pricing-feature { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--text); }
    .pricing-check { flex-shrink: 0; width: 20px; height: 20px; background: rgba(34, 197, 94, 0.12); color: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
    .pricing-cta { display: block; width: 100%; padding: 14px; font-size: 16px; font-weight: 600; background: var(--green); color: #fff; border: none; border-radius: 10px; cursor: pointer; transition: background 0.2s, transform 0.1s; text-decoration: none; text-align: center; font-family: inherit; }
    .pricing-cta:hover { background: var(--green-dark); }
    .pricing-cta:active { transform: scale(0.97); }

    .trust-row { display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; }
    .trust-item { display: flex; align-items: center; gap: 6px; font-size: .8rem; color: var(--muted); }
    .trust-item svg { color: var(--green); flex-shrink: 0; }

    .page-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; color: var(--muted); gap: 16px; }
    .page-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    .page-error { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 12px; text-align: center; padding: 0 20px; }
    .page-error-msg { font-size: 1rem; color: var(--red); }
    .back-link { font-size: .9rem; color: var(--accent); text-decoration: none; }
    .back-link:hover { text-decoration: underline; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .planes-wrapper { margin: 20px auto; padding: 0 16px 60px; }
      .pricing-grid { grid-template-columns: 1fr !important; }
      .pricing-card.featured { transform: none; }
      .pricing-price { font-size: 36px; }
      .pricing-card { padding: 24px; }
      .planes-heading { font-size: 1.35rem; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">AhoraTengoPagina</a>
    <div class="secure-badge">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Pago seguro
    </div>
  </header>

  <div id="page-loading" class="page-loading"><div class="page-spinner"></div><span>Cargando planes...</span></div>
  <div id="page-error" class="page-error" style="display:none"><span class="page-error-msg" id="page-error-msg"></span><a href="/" class="back-link">&larr; Volver al inicio</a></div>

  <div class="planes-wrapper" id="planes-content" style="display:none">
    <h1 class="planes-heading" id="planes-heading">Elige tu plan</h1>
    <p class="planes-sub" id="planes-sub">Tu p&aacute;gina web est&aacute; lista. Elige el plan que mejor se adapte a tu negocio.</p>
    <div class="pricing-grid" id="pricing-grid"></div>
    <div class="trust-row">
      <div class="trust-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Cancela cuando quieras</div>
      <div class="trust-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Sin contratos</div>
      <div class="trust-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Soporte en espa&ntilde;ol</div>
      <div class="trust-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Pago 100% seguro</div>
    </div>
  </div>

  <script>
  (function() {
    'use strict';

    var pathParts = window.location.pathname.split('/');
    var websiteId = pathParts[pathParts.length - 1];
    if (!websiteId || websiteId === 'planes') { showPageError('Enlace inv\u00e1lido.'); return; }

    init();

    async function init() {
      try {
        var responses = await Promise.all([
          fetch('/api/products/list'),
          fetch('/api/preview/website?id=' + encodeURIComponent(websiteId))
        ]);

        var productsData = await responses[0].json();
        var products = productsData.products || [];
        if (products.length === 0) throw new Error('No hay planes disponibles en este momento.');

        var businessName = null;
        if (responses[1].ok) {
          try {
            var previewData = await responses[1].json();
            businessName = previewData.businessName || null;
          } catch (e) { /* ignore */ }
        }

        if (businessName) {
          document.getElementById('planes-heading').innerHTML = 'Elige tu plan para <strong>' + escapeHtml(businessName) + '</strong>';
          document.title = 'Planes para ' + businessName + ' \u2014 AhoraTengoPagina';
        }

        renderPricingCards(products);

        document.getElementById('page-loading').style.display = 'none';
        document.getElementById('planes-content').style.display = '';
      } catch (err) {
        showPageError(err.message);
      }
    }

    function renderPricingCards(products) {
      var grid = document.getElementById('pricing-grid');
      var cols = Math.min(products.length, 3);
      grid.style.setProperty('--pricing-cols', cols);

      var html = '';
      products.forEach(function(product, index) {
        var isFeatured = products.length > 1 && index === products.length - 1;
        html += renderCard(product, isFeatured);
      });
      grid.innerHTML = html;
    }

    function renderCard(product, isFeatured) {
      var price = parseFloat(product.price);
      var symbol = '$';
      var formatted = symbol + price.toLocaleString('es-MX', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
      var intervalLabels = { monthly: ' / mes', yearly: ' / a\u00f1o', one_time: '' };
      var intervalText = (product.currency || 'MXN') + (intervalLabels[product.billing_interval] || '');
      var features = product.features || [];
      var featuredClass = isFeatured ? ' featured' : '';
      var badgeHtml = isFeatured ? '<span class="pricing-badge">Popular</span>' : '';

      var featuresHtml = features.map(function(f) {
        return '<div class="pricing-feature"><span class="pricing-check">&#10003;</span><span>' + escapeHtml(f) + '</span></div>';
      }).join('');

      var descHtml = product.description ? '<p class="pricing-desc">' + escapeHtml(product.description) + '</p>' : '';
      var ctaUrl = '/checkout/' + encodeURIComponent(product.id) + '?website=' + encodeURIComponent(websiteId);

      return '<div class="pricing-card' + featuredClass + '">' +
        badgeHtml +
        '<div class="pricing-price">' + formatted + ' <span>' + intervalText + '</span></div>' +
        '<p class="pricing-note">Sin costo de instalaci\u00f3n. Sin contratos.</p>' +
        (product.name ? '<p class="pricing-name">' + escapeHtml(product.name) + '</p>' : '') +
        descHtml +
        '<div class="pricing-features">' + featuresHtml + '</div>' +
        '<a href="' + ctaUrl + '" class="pricing-cta">Elegir plan</a>' +
      '</div>';
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    function showPageError(msg) {
      document.getElementById('page-loading').style.display = 'none';
      document.getElementById('page-error').style.display = '';
      document.getElementById('page-error-msg').textContent = msg;
    }
  })();
  </script>
</body>
</html>
